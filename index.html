<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Códigos QR</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Liquid Background Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div class="container">
        <!-- Left Side: Config Form -->
        <div class="formulario">
            <header class="header">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <path d="M14 14h7v7h-7z" />
                        <path d="M17 17h.01" />
                        <path d="M14 21h3" />
                        <path d="M21 17v3" />
                    </svg>
                    <span>QR | ESKAY</span>
                </div>
                <h1>Crea tus códigos QR</h1>
                <p>Personaliza, previsualiza y descarga tu código QR en tiempo real.</p>
            </header>

            <div class="inputs-group">
                <!-- Name Field -->
                <div class="campo">
                    <label for="nombre">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        Nombre del código QR
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="nombre" placeholder="Ej. Google">
                        <span class="focus-border"></span>
                    </div>
                </div>

                <!-- URL/Text Field -->
                <div class="campo">
                    <label for="texto">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                        </svg>
                        Contenido (URL o texto)
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="texto" placeholder="Ej. https://google.com">
                        <span class="focus-border"></span>
                    </div>
                </div>

                <!-- Color Selection -->
                <div class="campo">
                    <label>Color del código QR</label>
                    <div class="colores">
                        <label class="color-option" style="--color-theme: #000000;" title="Negro Obsidian">
                            <input type="radio" name="color" value="#000000" checked>
                            <span class="color-dot" style="background-color: #000000;"></span>
                        </label>

                        <label class="color-option" style="--color-theme: #4168e1;" title="Azul Real">
                            <input type="radio" name="color" value="#4168e1">
                            <span class="color-dot" style="background-color: #4168e1;"></span>
                        </label>

                        <label class="color-option" style="--color-theme: #888888;" title="Gris Acero">
                            <input type="radio" name="color" value="#888888">
                            <span class="color-dot" style="background-color: #888888;"></span>
                        </label>

                        <label class="color-option" style="--color-theme: #8b5cf6;" title="Púrpura Neón">
                            <input type="radio" name="color" value="#8b5cf6">
                            <span class="color-dot" style="background-color: #8b5cf6;"></span>
                        </label>

                        <label class="color-option" style="--color-theme: #10b981;" title="Verde Esmeralda">
                            <input type="radio" name="color" value="#10b981">
                            <span class="color-dot" style="background-color: #10b981;"></span>
                        </label>

                        <label class="color-option" style="--color-theme: #ef4444;" title="Rojo Vibrante">
                            <input type="radio" name="color" value="#ef4444">
                            <span class="color-dot" style="background-color: #ef4444;"></span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="acciones">
                <button class="btn btn-primary" id="btn-generar" onclick="generarQR()" disabled>
                    <span>Generar Código QR</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>

                <div class="btn-group-row">
                    <button class="btn btn-secondary" id="btn-descargar" onclick="descargarQR()" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        <span>Descargar</span>
                    </button>
                    <button class="btn btn-tertiary" onclick="reiniciarFormulario()" title="Crear otro código QR">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
                        </svg>
                        <span>Reiniciar</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Side: Phone Glass Preview -->
        <div class="preview">
            <div class="phone-frame">
                <!-- Phone Top Bar -->
                <div class="phone-header">
                    <span class="phone-time">09:41</span>
                    <div class="dynamic-island"></div>
                    <div class="phone-icons">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round" class="status-icon">
                            <path
                                d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
                        </svg>
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round" class="status-icon">
                            <rect x="2" y="7" width="16" height="10" rx="2" ry="2" />
                            <line x1="22" y1="11" x2="22" y2="13" />
                        </svg>
                    </div>
                </div>

                <!-- QR Container Area -->
                <div class="qr-container" id="qr-container-wrapper">
                    <div class="qr-card">
                        <div class="qr-canvas-holder">
                            <canvas id="qrcode"></canvas>
                            <!-- Scan line animation overlay -->
                            <div class="scan-line"></div>
                            <!-- Corner brackets for visual guide -->
                            <div class="corner corner-tl"></div>
                            <div class="corner corner-tr"></div>
                            <div class="corner corner-bl"></div>
                            <div class="corner corner-br"></div>
                        </div>
                        <div class="qr-badge">
                            <span class="pulse-dot"></span>
                            <span id="qr-badge-text">Esperando datos</span>
                        </div>
                        <p class="scan-me-text">SCAN ME</p>
                    </div>
                </div>

                <!-- Phone Bottom Bar -->
                <div class="phone-home-indicator"></div>
            </div>
        </div>
    </div>

    <!-- QR Code Generator Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
